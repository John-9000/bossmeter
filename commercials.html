<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Boss Commercials</title>
  <meta name="description" content="Boss commercials" />
  <link rel="stylesheet" href="./styles.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7548877721858943"
     crossorigin="anonymous"></script>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section class="card card--ads" aria-label="Commercials card">
        <div class="commercialsTopBar">
          <a class="scoreBackBtn" id="commercialsBackBtn" href="./index.html">Boss Score: --</a>
        </div>

        <p class="adsSubtitle" id="commercialsHeader">A brief commercial intermission for your boss journey</p>

        <section class="commercialCard" aria-label="Advertisement">
          <div class="commercialBadge">Advertisement</div>
          <div class="commercialFrame" id="commercialFrame">
            <div class="commercialFrameInner commercialFrameInner--adsense" id="commercialAdsRoot">
              <ins
                class="adsbygoogle commercialAdsUnit"
                id="commercialAdsUnit"
                style="display:block"
                data-ad-client="ca-pub-7548877721858943"
                data-ad-slot="7206642021"
                data-ad-format="auto"
                data-full-width-responsive="true"
              ></ins>
            </div>
          </div>
        </section>

        <div class="commercialActions">
          <a class="scoreBackBtn scoreBackBtn--small" href="./index.html">Back</a>
          <button class="outlinePillBtn" id="otherCommercialsBtn" type="button">Other Boss Commercials</button>
        </div>

        <div class="appPromoCard appPromoCard--commercials">
          <a
            class="appStoreBtn"
            href="https://play.google.com/store/apps/details?id=uk.co.bossdeboss.bossmeter"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="appStoreBtnInner">
              <span class="appStoreIcon" aria-hidden="true">
                <img class="appStoreIconImg" src="./assets/google-play-icon.png" alt="" />
              </span>
              <span class="appStoreTitle">Get Boss Meter on Google Play</span>
            </span>
          </a>
        </div>

        <section class="inspirationCard" aria-label="Boss Inspiration">
          <div class="inspirationQuoteBlock">
            <p class="inspirationQuote" id="inspirationQuote">Loading quote...</p>
            <p class="inspirationAuthor" id="inspirationAuthor"></p>
          </div>
          <div class="inspirationControl">
            <button class="inspirationPillBtn" id="inspirationPillBtn" type="button">
              <span class="inspirationPillLabel">Boss Inspiration</span>
              <span class="inspirationPercent" id="inspirationPercent">0%</span>
            </button>
          </div>
        </section>
      </section>

      <div class="footerArea">
        <div class="fineLinks">
          <a class="fineLink" href="./about.html">About</a> ·
          <a class="fineLink" href="./contact.html">Contact</a> ·
          <a class="fineLink" href="./privacy.html">Privacy Policy</a>
        </div>
        <p style="text-align:center; color: rgba(148,163,184,0.65); font-size:12px; margin-top:10px;">
          © 2026 Boss Meter. All rights reserved.
        </p>
      </div>
    </div>
  </main>

  <script src="./content.js"></script>
  <script src="./script.js"></script>
</body>
</html>
